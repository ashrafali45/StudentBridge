
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudentBridge - Jobs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f7fa;
    }

    /* Navbar */
    .navbar {
  background-color: #2c3e50;
  color: white;
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* NEW: menu container */
.nav-links {
  display: flex;
  gap: 25px; /* space between items */
  margin-right: 100px; /* move a bit left */
}

.navbar a {
  color: white;
  text-decoration: none;
  font-size: 16px;
}

    /* Container */
    .container {
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Search Bar */
    .search-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    .search-box button {
      padding: 10px 15px;
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* Job Cards */
    .job-card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .job-card h3 {
      margin: 0;
    }

    .job-card p {
      margin: 5px 0;
    }

    .apply-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #2ecc71;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div><strong>StudentBridge</strong></div>
    <div>
      <a href="#">Home</a>
      <a href="#">Jobs</a>
      <a href="#">Login</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>Find Part-Time Jobs</h1>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by job title...">
      <button onclick="searchJobs()">Search</button>
    </div>

    <!-- Job List -->
    <div id="jobList">

      <div class="job-card">
        <h3>Part-time Cafe Worker</h3>
        <p>📍 Location: Ulsan</p>
        <p>🕒 Hours: Evening</p>
        <button class="apply-btn">Apply</button>
      </div>

      <div class="job-card">
        <h3>Store Assistant</h3>
        <p>📍 Location: Busan</p>
        <p>🕒 Hours: Weekend</p>
        <button class="apply-btn">Apply</button>
      </div>

      <div class="job-card">
        <h3>Restaurant Helper</h3>
        <p>📍 Location: Seoul</p>
        <p>🕒 Hours: Flexible</p>
        <button class="apply-btn">Apply</button>
      </div>

    </div>
  </div>

  <!-- JavaScript -->
  <script>
    function searchJobs() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      let jobs = document.getElementsByClassName("job-card");

      for (let i = 0; i < jobs.length; i++) {
        let title = jobs[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

        if (title.includes(input)) {
          jobs[i].style.display = "block";
        } else {
          jobs[i].style.display = "none";
        }
      }
    }
  </script>

</body>
</html>
